# Streamlit theme lock
# 위치가 중요합니다: 반드시 앱 실행 작업 디렉토리 기준 .streamlit/config.toml 로 배치해야 합니다.
# 목적: 로컬, Streamlit Cloud, 전산센터 서버, iframe 배포 환경에서 동일한 라이트 테마를 사용합니다.

[theme]
base = "light"
primaryColor = "#2563EB"
backgroundColor = "#F5F7FB"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0F172A"
font = "sans serif"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false

[server]
headless = true
